<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高捷隨行 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .tab-active { color: #3b82f6; transform: scale(1.1); }
        .station-card:active { transform: scale(0.92); transition: 0.1s; }
        .page { display: none; }
        .page-active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F2F2F7]">

    <header class="ios-blur sticky top-0 z-40 border-b border-gray-200 px-6 pt-12 pb-4">
        <h1 id="nav-title" class="text-3xl font-bold text-gray-900">高雄捷運</h1>
        <p class="text-xs text-gray-500 font-semibold mt-1" id="real-time">2026年5月7日 星期四</p>
    </header>

    <main id="page-map" class="page page-active px-4 py-6 pb-32 space-y-8">
        <section class="bg-white rounded-[24px] p-5 shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">即時運算中</span>
                <span class="flex items-center text-[10px] text-green-500 font-bold">● 系統正常營運</span>
            </div>
            <div class="h-1 w-full bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-red-500 animate-[pulse_2s_infinite]" style="width: 100%"></div>
            </div>
        </section>

        <div class="space-y-6">
            <div>
                <h3 class="px-2 mb-3 text-lg font-bold flex items-center text-red-600"><i class="bi bi-circle-fill text-[10px] mr-2"></i>紅線 Red Line</h3>
                <div class="flex overflow-x-auto gap-4 no-scrollbar px-2" id="red-line"></div>
            </div>
            <div>
                <h3 class="px-2 mb-3 text-lg font-bold flex items-center text-green-600"><i class="bi bi-circle-fill text-[10px] mr-2"></i>輕軌 LRT</h3>
                <div class="flex overflow-x-auto gap-4 no-scrollbar px-2" id="lrt-line"></div>
            </div>
        </div>
    </main>

    <main id="page-qr" class="page px-4 py-10 flex flex-col items-center">
        <div class="w-full max-w-sm bg-white rounded-3xl p-6 shadow-xl border border-gray-100 text-center">
            <h2 class="text-2xl font-bold mb-4">站點集章</h2>
            <div id="reader" class="overflow-hidden rounded-2xl bg-black w-full aspect-square mb-6"></div>
            <p class="text-sm text-gray-500">掃描站點內的 QR Code 完成集章</p>
        </div>
    </main>

    <main id="page-profile" class="page px-4 py-6">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
            <div class="flex items-center space-x-4 mb-6">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 text-2xl">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold">旅行探險家</h2>
                    <p class="text-sm text-gray-400">已集章：<span id="stamp-count">0</span> / 60</p>
                </div>
            </div>
            <div class="border-t pt-4">
                <h4 class="font-bold mb-3">我的足跡</h4>
                <div id="visit-history" class="text-center py-10 text-gray-400 text-sm">尚無記錄，快去集章吧！</div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-8 left-8 right-8 h-16 ios-blur border border-white/30 rounded-[32px] shadow-2xl flex justify-around items-center px-4 z-50">
        <button onclick="showPage('map')" id="btn-map" class="tab-button p-3 tab-active"><i class="bi bi-map-fill text-2xl"></i></button>
        <button onclick="showPage('qr')" id="btn-qr" class="tab-button p-3 text-gray-400"><i class="bi bi-qr-code-scan text-2xl"></i></button>
        <button onclick="showPage('profile')" id="btn-profile" class="tab-button p-3 text-gray-400"><i class="bi bi-person-fill text-2xl"></i></button>
    </nav>

    <script>
        // 資料設定
        const RED = ["R3 小港", "R8 三多商圈", "R10 美麗島", "R11 高雄車站", "R14 巨蛋", "R16 左營"];
        const LRT = ["C1 籬仔內", "C12 駁二大義", "C21 美術館", "C24 愛河之心", "C37 輕軌機廠"];
        let stamps = JSON.parse(localStorage.getItem('kmrt_stamps') || '[]');

        // 初始化頁面與事件
        function init() {
            renderList('red-line', RED, 'bg-red-500');
            renderList('lrt-line', LRT, 'bg-green-600');
            updateStampUI();
        }

        function renderList(id, data, color) {
            const el = document.getElementById(id);
            data.forEach(name => {
                const card = document.createElement('div');
                card.className = "station-card flex-shrink-0 w-32 h-40 bg-white rounded-[24px] p-4 border border-gray-100 shadow-sm flex flex-col justify-between";
                card.onclick = () => alert(`查看 ${name} 附近熱門景點...`);
                card.innerHTML = `
                    <div class="w-8 h-8 ${color} rounded-full flex items-center justify-center text-[10px] text-white font-black">${name.split(' ')[0]}</div>
                    <div class="font-bold text-sm text-gray-800">${name.split(' ')[1]}</div>
                `;
                el.appendChild(card);
            });
        }

        function showPage(pageId) {
            // 切換分頁顯示
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById(`page-${pageId}`).classList.add('page-active');
            
            // 切換按鈕顏色
            document.querySelectorAll('.tab-button').forEach(b => b.classList.replace('text-blue-500', 'text-gray-400'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`btn-${pageId}`).classList.add('tab-active');

            // 如果是 QR 頁面則開啟相機
            if(pageId === 'qr') startScanner();
            else stopScanner();
        }

        let html5QrCode;
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    if(!stamps.includes(decodedText)) {
                        stamps.push(decodedText);
                        localStorage.setItem('kmrt_stamps', JSON.stringify(stamps));
                        alert("🎉 集章成功：" + decodedText);
                        updateStampUI();
                        showPage('profile');
                    }
                }
            ).catch(err => console.error("相機啟動失敗", err));
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => html5QrCode = null).catch(e => {});
            }
        }

        function updateStampUI() {
            document.getElementById('stamp-count').innerText = stamps.length;
            if(stamps.length > 0) {
                document.getElementById('visit-history').innerHTML = stamps.map(s => 
                    `<div class="flex justify-between px-4 py-2 border-b text-sm"><span>${s}</span><span class="text-green-500">已解鎖</span></div>`
                ).join('');
            }
        }

        init();
    </script>
</body>
</html>

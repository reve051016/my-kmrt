<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高捷全線集章</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, sans-serif; background: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .station-dot { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .station-dot:active { transform: scale(0.8); }
        .visited-active { background: #22c55e !important; border-color: #16a34a !important; color: white !important; }
        .line-v { position: absolute; width: 6px; top: 0; bottom: 0; left: 24px; z-index: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <header class="ios-blur sticky top-0 z-50 px-6 pt-12 pb-4 border-b border-gray-200">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-gray-800">KH MRT TRACK</h1>
            <div class="bg-blue-500 text-white px-4 py-1 rounded-full text-xs font-bold shadow-lg shadow-blue-200">
                已訪 <span id="count">0</span> 站
            </div>
        </div>
    </header>

    <div class="p-6 space-y-10">
        <section class="relative pl-16">
            <div class="line-v bg-red-500"></div>
            <h2 class="absolute -left-2 top-0 origin-left -rotate-90 text-[10px] font-black text-red-500 tracking-[0.2em]">RED LINE</h2>
            <div class="space-y-8" id="red-nodes">
                </div>
        </section>

        <section class="relative pl-16">
            <div class="line-v bg-orange-500"></div>
            <h2 class="absolute -left-2 top-0 origin-left -rotate-90 text-[10px] font-black text-orange-500 tracking-[0.2em]">ORANGE LINE</h2>
            <div class="space-y-8" id="orange-nodes"></div>
        </section>
    </div>

    <nav class="fixed bottom-8 left-8 right-8 h-16 ios-blur border border-white/30 rounded-[32px] shadow-2xl flex justify-around items-center px-4 z-50">
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="p-3 text-blue-500"><i class="bi bi-geo-fill text-2xl"></i></button>
        <button onclick="clearAll()" class="p-3 text-gray-300"><i class="bi bi-trash3 text-2xl"></i></button>
    </nav>

    <script>
        const STATIONS = {
            red: ["R24 岡山", "R21 都會公園", "R16 左營", "R14 巨蛋", "R13 凹子底", "R11 高雄車站", "R10 美麗島", "R9 中央公園", "R8 三多商圈", "R3 小港"],
            orange: ["O1 哈瑪星", "O2 鹽埕埔", "O4 市議會", "O5 美麗島", "O7 文化中心", "O13 大東", "O14 鳳山國中"]
        };

        let visits = JSON.parse(localStorage.getItem('kmrt_final') || '[]');

        function render() {
            renderSection('red-nodes', STATIONS.red, 'border-red-500 text-red-500');
            renderSection('orange-nodes', STATIONS.orange, 'border-orange-500 text-orange-500');
            updateUI();
        }

        function renderSection(id, list, theme) {
            const container = document.getElementById(id);
            list.forEach(name => {
                const sid = name.split(' ')[0];
                const sname = name.split(' ')[1];
                const div = document.createElement('div');
                div.className = "flex items-center space-x-4";
                div.innerHTML = `
                    <div id="${sid}" onclick="clickStation('${sid}', '${sname}')" 
                         class="station-dot w-10 h-10 rounded-full bg-white border-4 ${theme} flex items-center justify-center font-black text-[10px] z-10 shadow-sm">
                        ${sid}
                    </div>
                    <div class="text-gray-700 font-bold">${sname}</div>
                `;
                container.appendChild(div);
            });
        }

        function clickStation(id, name) {
            const idx = visits.indexOf(id);
            if (idx === -1) {
                visits.push(id);
                if(navigator.vibrate) navigator.vibrate(30);
            } else {
                if(confirm(`取消 ${name} 的紀錄？`)) visits.splice(idx, 1);
            }
            localStorage.setItem('kmrt_final', JSON.stringify(visits));
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.station-dot').forEach(dot => {
                const sid = dot.id;
                if(visits.includes(sid)) {
                    dot.classList.add('visited-active');
                    dot.innerHTML = '<i class="bi bi-check-lg text-lg"></i>';
                } else {
                    dot.classList.remove('visited-active');
                    dot.innerHTML = sid;
                }
            });
            document.getElementById('count').innerText = visits.length;
        }

        function clearAll() {
            if(confirm('確定要清空所有紀錄嗎？')) {
                visits = [];
                localStorage.setItem('kmrt_final', '[]');
                updateUI();
            }
        }

        render();
    </script>
</body>
</html>

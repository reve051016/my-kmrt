<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高捷互動地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; -webkit-user-select: none; }
        .ios-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        /* 路線線條 */
        .line-red { position: absolute; width: 6px; background: #E60012; left: 35%; top: 0; bottom: 0; z-index: 0; }
        .line-orange { position: absolute; height: 6px; background: #F5821F; left: 10%; right: 10%; top: 50%; z-index: 0; }
        /* 站點圓圈 */
        .station-node { 
            position: relative; z-index: 10; width: 44px; height: 44px; 
            border-radius: 50%; background: white; border: 3px solid #ccc;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; transition: all 0.3s;
        }
        .node-red { border-color: #E60012; color: #E60012; }
        .node-orange { border-color: #F5821F; color: #F5821F; }
        .node-lrt { border-color: #78BE20; color: #78BE20; }
        /* 已拜訪樣式 */
        .is-visited { background: #4ade80 !important; border-color: #22c55e !important; color: white !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        .is-visited::after { content: '✓'; font-size: 14px; }
        /* 分頁切換 */
        .page { display: none; }
        .page-active { display: block; }
    </style>
</head>
<body class="pb-24">

    <header class="ios-blur sticky top-0 z-50 px-6 pt-12 pb-4 border-b border-gray-100 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black">高捷地圖集章</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Click station to check-in</p>
        </div>
        <div class="bg-gray-100 px-3 py-1 rounded-full text-sm font-bold">
            已訪：<span id="total-count" class="text-blue-600">0</span>
        </div>
    </header>

    <main id="page-map" class="page page-active relative p-10 min-h-screen">
        <div class="line-red"></div>
        
        <div class="flex flex-col items-center space-y-12 relative">
            <div onclick="toggle('R16', '左營')" id="R16" class="station-node node-red">R16</div>
            <div onclick="toggle('R14', '巨蛋')" id="R14" class="station-node node-red">R14</div>
            <div onclick="toggle('R13', '凹子底')" id="R13" class="station-node node-red">R13</div>
            
            <div class="relative w-full flex justify-center py-4">
                <div class="absolute h-1.5 bg-orange-400 left-0 right-0 top-1/2 -translate-y-1/2 z-0"></div>
                <div onclick="toggle('R10', '美麗島')" id="R10" class="station-node border-[6px] border-double border-slate-400 bg-white" style="width: 56px; height: 56px;">R10</div>
            </div>

            <div onclick="toggle('R9', '中央公園')" id="R9" class="station-node node-red">R9</div>
            <div onclick="toggle('R8', '三多商圈')" id="R8" class="station-node node-red">R8</div>
            <div onclick="toggle('O1', '哈瑪星')" id="O1" class="station-node node-orange shadow-lg">O1</div>
            <div onclick="toggle('C24', '愛河之心')" id="C24" class="station-node node-lrt">C24</div>
        </div>

        <div class="mt-10 p-6 text-center text-gray-400 text-xs italic">
            更多站點建置中... 點擊上方圖標紀錄足跡
        </div>
    </main>

    <main id="page-list" class="page p-6">
        <h2 class="text-xl font-bold mb-4 text-gray-800">我的成就清單</h2>
        <div id="history-list" class="space-y-3">
            </div>
    </main>

    <nav class="fixed bottom-8 left-10 right-10 h-16 ios-blur border border-white/20 rounded-full shadow-2xl flex justify-around items-center px-4 z-50">
        <button onclick="showPage('map')" id="btn-map" class="text-blue-500"><i class="bi bi-geo-alt-fill text-2xl"></i></button>
        <button onclick="showPage('list')" id="btn-list" class="text-gray-400"><i class="bi bi-trophy-fill text-2xl"></i></button>
    </nav>

    <script>
        let visits = JSON.parse(localStorage.getItem('kmrt_v2') || '[]');

        function toggle(id, name) {
            const idx = visits.findIndex(v => v.id === id);
            if(idx === -1) {
                visits.push({id, name, date: new Date().toLocaleString()});
                // 手機震動反饋
                if (navigator.vibrate) navigator.vibrate(20);
            } else {
                if(confirm(`要刪除 ${name} 的紀錄嗎？`)) {
                    visits.splice(idx, 1);
                }
            }
            localStorage.setItem('kmrt_v2', JSON.stringify(visits));
            updateUI();
        }

        function updateUI() {
            // 清除所有狀態
            document.querySelectorAll('.station-node').forEach(n => {
                n.classList.remove('is-visited');
                if(!n.classList.contains('is-visited')) {
                    n.innerText = n.id;
                }
            });

            // 標記已訪
            visits.forEach(v => {
                const node = document.getElementById(v.id);
                if(node) {
                    node.classList.add('is-visited');
                    node.innerText = '';
                }
            });

            document.getElementById('total-count').innerText = visits.length;

            // 更新清單
            const list = document.getElementById('history-list');
            if(visits.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-400 mt-20">還沒有紀錄任何站點喔！</p>`;
            } else {
                list.innerHTML = visits.map(v => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center animate-[fadeIn_0.5s]">
                        <div>
                            <span class="font-black text-gray-400 mr-2">${v.id}</span>
                            <span class="font-bold">${v.name}</span>
                        </div>
                        <span class="text-[10px] text-gray-400">${v.date}</span>
                    </div>
                `).join('');
            }
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('page-active'));
            document.getElementById('page-' + p).classList.add('page-active');
            
            document.getElementById('btn-map').className = p === 'map' ? 'text-blue-500' : 'text-gray-400';
            document.getElementById('btn-list').className = p === 'list' ? 'text-blue-500' : 'text-gray-400';
        }

        updateUI();
    </script>
</body>
</html>

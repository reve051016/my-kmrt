<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高捷手札回憶錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #fcfaf2; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 25px 25px; font-family: sans-serif; }
        .notebook-line { border-left: 2px dashed #ccc; margin-left: 20px; padding-left: 20px; position: relative; }
        .station-item { transition: all 0.3s; }
        .checked-dot { background: #ffeb3b !important; border: 2px solid #fbc02d !important; transform: rotate(-5deg); }
        .photo-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 2px solid #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); transform: rotate(3deg); }
        #memo-modal { display: none; }
        .sticky-note { background: #fff9c4; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="pb-32">

    <header class="p-8 pb-0">
        <h1 class="text-3xl font-bold text-gray-800 underline decoration-yellow-400 decoration-4">高捷回憶手札</h1>
        <p class="text-[10px] text-gray-400 mt-2 font-bold tracking-widest uppercase">Travel Gallery 2026</p>
    </header>

    <div class="p-6 space-y-12">
        <section><h2 class="text-lg font-black text-red-500 mb-6 underline">RED LINE</h2><div class="notebook-line" id="red-list"></div></section>
        <section><h2 class="text-lg font-black text-orange-500 mb-6 underline">ORANGE LINE</h2><div class="notebook-line" id="orange-list"></div></section>
    </div>

    <div id="memo-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-6">
        <div class="sticky-note w-full max-w-sm p-6 rounded-sm">
            <h3 id="m-title" class="text-xl font-bold mb-4 border-b border-gray-400 pb-2">站點紀錄</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-1">📸 上傳照片</label>
                    <input type="file" id="m-file" accept="image/*" class="text-xs w-full">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-1">📝 心情筆記</label>
                    <textarea id="m-note" rows="3" class="w-full bg-transparent border-b border-gray-300 focus:outline-none text-sm" placeholder="今天心情如何？"></textarea>
                </div>
            </div>
            <div class="flex space-x-2 mt-6">
                <button onclick="save()" class="flex-1 bg-gray-800 text-white py-2 rounded-sm font-bold text-xs">保存回憶</button>
                <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 text-xs">取消</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 px-10 py-4 bg-white/90 rounded-full shadow-2xl flex items-center space-x-8 z-40">
        <div class="text-center"><div id="total" class="text-xl font-black text-blue-600">0</div><div class="text-[8px] text-gray-400 font-bold uppercase">Visited</div></div>
        <button onclick="clearAll()" class="text-gray-300"><i class="bi bi-eraser-fill text-2xl"></i></button>
    </nav>

    <script>
        const RED = ["R16 左營", "R14 巨蛋", "R10 美麗島", "R8 三多商圈", "R3 小港"]; // 示範站點，可自行補齊
        const ORANGE = ["O1 哈瑪星", "O5 美麗島", "O13 大東"];
        let db = JSON.parse(localStorage.getItem('k_metro_v3') || '{}');
        let curId = null;

        function build() {
            gen('red-list', RED); gen('orange-list', ORANGE); refresh();
        }

        function gen(container, data) {
            const box = document.getElementById(container);
            data.forEach(s => {
                const [id, name] = s.split(' ');
                const item = document.createElement('div');
                item.className = "flex items-center mb-8 station-item";
                item.innerHTML = `
                    <div id="dot-${id}" onclick="openNote('${id}', '${name}')" class="w-10 h-10 rounded-full bg-white border-2 border-gray-200 flex-shrink-0 flex items-center justify-center text-[10px] font-bold z-10 shadow-sm mr-4">${id}</div>
                    <div class="flex flex-col flex-1">
                        <span class="text-sm font-bold text-gray-700">${name}</span>
                        <div id="note-${id}" class="text-[10px] text-gray-400 italic mt-1"></div>
                    </div>
                    <div id="img-${id}"></div>
                `;
                box.appendChild(item);
            });
        }

        function openNote(id, name) {
            curId = id; document.getElementById('m-title').innerText = name;
            document.getElementById('m-note').value = db[id]?.note || '';
            document.getElementById('memo-modal').classList.add('modal-open');
        }

        function closeModal() { document.getElementById('memo-modal').classList.remove('modal-open'); }

        async function save() {
            const note = document.getElementById('m-note').value;
            const file = document.getElementById('m-file').files[0];
            let imgData = db[curId]?.img || null;

            if (file) {
                imgData = await compressImage(file);
            }

            db[curId] = { note, img: imgData };
            localStorage.setItem('k_metro_v3', JSON.stringify(db));
            closeModal(); refresh();
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 120; // 縮圖尺寸
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                        else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        function refresh() {
            Object.keys(db).forEach(id => {
                const dot = document.getElementById('dot-' + id);
                const noteEl = document.getElementById('note-' + id);
                const imgEl = document.getElementById('img-' + id);
                if (dot) dot.classList.add('checked-dot');
                if (noteEl) noteEl.innerText = db[id].note || '';
                if (imgEl && db[id].img) imgEl.innerHTML = `<img src="${db[id].img}" class="photo-thumb">`;
            });
            document.getElementById('total').innerText = Object.keys(db).length;
        }

        function clearAll() { if(confirm('要清空手札嗎？')) { db = {}; localStorage.clear(); location.reload(); } }
        build();
    </script>
</body>
</html>

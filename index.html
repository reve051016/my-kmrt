<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>高雄捷運隨機旅程</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
        radial-gradient(circle at top left,#ffd6e0 0%,transparent 35%),
        radial-gradient(circle at bottom right,#c9d6ff 0%,transparent 35%),
        linear-gradient(135deg,#f8fbff,#eef2ff);
    padding:25px;
}

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.6;
}

.bg1{
    width:420px;
    height:420px;
    background:#ff4d6d;
    top:-180px;
    left:-120px;
}

.bg2{
    width:400px;
    height:400px;
    background:#6c63ff;
    bottom:-170px;
    right:-120px;
}

.container{
    width:100%;
    max-width:520px;
    position:relative;
    z-index:2;
}

.card{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.5);
    border-radius:34px;
    padding:40px 28px;
    box-shadow:
        0 20px 60px rgba(52,72,120,0.18),
        inset 0 1px 0 rgba(255,255,255,0.7);
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    font-size:2.2rem;
    font-weight:900;
    color:#2b2f42;
    margin-bottom:10px;
    letter-spacing:1px;
}

.header p{
    color:#70798b;
    font-size:0.95rem;
}

.result-area{
    display:flex;
    flex-direction:column;
    gap:20px;
    margin-bottom:30px;
}

.result-box{
    background:white;
    border-radius:24px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.06);
    transition:0.3s;
}

.result-box:hover{
    transform:translateY(-3px);
}

.label{
    font-size:0.9rem;
    color:#7a8196;
    margin-bottom:12px;
}

.value{
    font-size:1.9rem;
    font-weight:800;
    letter-spacing:1px;
    transition:0.25s;
    word-break:break-word;
}

.station{
    color:#ff4d6d;
}

.budget{
    color:#5e60ff;
}

button{
    width:100%;
    border:none;
    border-radius:22px;
    padding:18px;
    cursor:pointer;
    font-size:1rem;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#ff4d6d,#6c63ff);
    box-shadow:0 15px 35px rgba(108,99,255,0.35);
    transition:0.25s;
}

button:hover{
    transform:translateY(-2px) scale(1.01);
}

button:active{
    transform:scale(0.98);
}

.footer{
    margin-top:24px;
    text-align:center;
    color:#8b93a7;
    font-size:0.82rem;
}

.line-tag{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    border-radius:999px;
    font-size:0.8rem;
    font-weight:700;
    background:#f3f4ff;
    color:#5e60ff;
}

@media(max-width:520px){

    .card{
        padding:34px 22px;
        border-radius:28px;
    }

    .header h1{
        font-size:1.8rem;
    }

    .value{
        font-size:1.55rem;
    }
}

</style>
</head>

<body>

<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>

<div class="container">

    <div class="card">

        <div class="header">
            <h1>高雄捷運隨機旅程</h1>
            <p>今天就來一場說走就走的小旅行</p>
        </div>

        <div class="result-area">

            <div class="result-box">
                <div class="label">🚇 今日捷運站</div>

                <div class="value station" id="station">
                    點擊下方開始抽選
                </div>

                <div class="line-tag" id="lineTag">
                    高雄捷運
                </div>
            </div>

            <div class="result-box">
                <div class="label">💰 今日預算</div>

                <div class="value budget" id="budget">
                    NT$ ???
                </div>
            </div>

        </div>

        <button onclick="drawRandom()">
            隨機抽取今天旅程
        </button>

        <div class="footer">
            Kaohsiung MRT Random Travel Generator
        </div>

    </div>

</div>

<script>

// 高雄捷運紅線
const redLine = [
    "岡山車站",
    "橋頭火車站",
    "橋頭糖廠",
    "青埔",
    "都會公園",
    "後勁",
    "楠梓科技園區",
    "油廠國小",
    "世運",
    "左營／高鐵",
    "生態園區",
    "巨蛋",
    "凹子底",
    "後驛",
    "高雄車站",
    "美麗島",
    "中央公園",
    "三多商圈",
    "獅甲",
    "凱旋",
    "前鎮高中",
    "草衙",
    "高雄國際機場",
    "小港"
];

// 高雄捷運橘線
const orangeLine = [
    "哈瑪星",
    "鹽埕埔",
    "前金",
    "美麗島",
    "信義國小",
    "文化中心",
    "五塊厝",
    "技擊館",
    "衛武營",
    "鳳山西",
    "鳳山",
    "大東",
    "鳳山國中",
    "大寮"
];

// 合併所有站點
const stations = [
    ...redLine.map(station => ({
        name: station,
        line: "紅線"
    })),

    ...orangeLine.map(station => ({
        name: station,
        line: "橘線"
    }))
];

// 隨機陣列項目
function randomItem(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

// 500~3000 隨機預算
function randomBudget(min,max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// 動畫效果
function animateText(element, text){

    element.style.opacity = 0.2;
    element.style.transform = "translateY(6px)";

    setTimeout(() => {
        element.innerText = text;
        element.style.opacity = 1;
        element.style.transform = "translateY(0)";
    },180);
}

// 主抽選功能
function drawRandom(){

    const result = randomItem(stations);

    const budget = randomBudget(500,3000);

    animateText(
        document.getElementById("station"),
        result.name
    );

    animateText(
        document.getElementById("budget"),
        `NT$ ${budget}`
    );

    document.getElementById("lineTag").innerText =
        `高雄捷運 ${result.line}`;
}

</script>

</body>
</html>

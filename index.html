<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高捷隨行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-blur { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-[#F2F2F7] text-black overflow-x-hidden">

    <!-- Top Header -->
    <header class="ios-blur sticky top-0 z-50 border-b border-gray-200 px-5 pt-12 pb-4">
        <div class="flex justify-between items-end">
            <div>
                <p id="date" class="text-xs font-semibold text-gray-500 uppercase tracking-tighter">MAY 7, 2026</p>
                <h1 class="text-3xl font-bold">高雄捷運</h1>
            </div>
            <div id="weather" class="text-right pb-1">
                <span class="text-2xl">☀️</span>
                <span class="font-semibold text-lg ml-1">28°</span>
            </div>
        </div>
    </header>

    <main class="px-4 py-6 space-y-8">
        
        <!-- 路線動畫卡片 -->
        <section class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold text-gray-400 mb-4 tracking-widest uppercase">系統狀態</h2>
            <div class="relative h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                <div id="line-anim" class="absolute top-0 left-0 h-full bg-red-500 w-0 transition-all duration-[2000ms] ease-in-out"></div>
            </div>
            <div class="flex justify-between mt-3 text-[10px] font-mono text-gray-400">
                <span>R3 小港</span>
                <span class="text-green-500">● 正常營運</span>
                <span>R24 岡山</span>
            </div>
        </section>

        <!-- 捷運線滾動區域 -->
        <div id="mrt-lines" class="space-y-6">
            <!-- 紅線 -->
            <div class="space-y-3">
                <h3 class="px-2 text-lg font-bold flex items-center">
                    <span class="w-2 h-6 bg-red-500 rounded-full mr-2"></span>紅線 Red Line
                </h3>
                <div class="flex overflow-x-auto gap-4 no-scrollbar px-2" id="red-line-list"></div>
            </div>

            <!-- 輕軌 -->
            <div class="space-y-3">
                <h3 class="px-2 text-lg font-bold flex items-center">
                    <span class="w-2 h-6 bg-green-500 rounded-full mr-2"></span>輕軌 LRT
                </h3>
                <div class="flex overflow-x-auto gap-4 no-scrollbar px-2" id="lrt-line-list"></div>
            </div>
        </div>

        <!-- 附近景點 API 模擬 -->
        <section class="space-y-4">
            <h3 class="px-2 text-lg font-bold">附近熱門景點</h3>
            <div id="places" class="grid grid-cols-2 gap-3">
                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="h-24 bg-gray-200 rounded-xl mb-2"></div>
                    <p class="font-bold text-sm">駁二藝術特區</p>
                    <p class="text-xs text-gray-400">距離 300m</p>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="h-24 bg-gray-200 rounded-xl mb-2"></div>
                    <p class="font-bold text-sm">高雄流行音樂中心</p>
                    <p class="text-xs text-gray-400">距離 850m</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Scanner Overlay (Hidden) -->
    <div id="scanner-ui" class="fixed inset-0 z-[100] bg-black hidden flex-col items-center justify-center">
        <div id="reader" class="w-full max-w-sm"></div>
        <button onclick="toggleScanner()" class="mt-8 px-8 py-3 bg-white text-black rounded-full font-bold">關閉</button>
    </div>

    <!-- iOS Tab Bar -->
    <nav class="fixed bottom-6 left-6 right-6 h-16 ios-blur border border-white/30 rounded-[30px] shadow-2xl flex justify-around items-center px-4 safe-area-bottom">
        <button class="p-3 text-blue-500"><i class="bi bi-map-fill text-2xl"></i></button>
        <button onclick="toggleScanner()" class="p-3 text-gray-400 hover:text-blue-500"><i class="bi bi-qr-code-scan text-2xl"></i></button>
        <button class="p-3 text-gray-400 hover:text-blue-500"><i class="bi bi-journal-bookmark-fill text-2xl"></i></button>
        <button class="p-3 text-gray-400 hover:text-blue-500"><i class="bi bi-person-fill text-2xl"></i></button>
    </nav>

    <script>
        // 站點資料
        const RED_STATIONS = ["R3 小港", "R8 三多商圈", "R10 美麗島", "R11 高雄車站", "R13 凹子底", "R14 巨蛋", "R16 左營"];
        const LRT_STATIONS = ["C1 籬仔內", "C12 駁二大義", "C21 美術館", "C24 愛河之心", "C37 輕軌機廠"];

        // 渲染站點
        function renderStations(listId, stations, color) {
            const container = document.getElementById(listId);
            stations.forEach(s => {
                const div = document.createElement('div');
                div.className = "flex-shrink-0 w-32 h-40 bg-white rounded-[24px] p-4 border border-gray-100 shadow-sm flex flex-col justify-between active:scale-95 transition-transform";
                div.innerHTML = `
                    <div class="w-8 h-8 ${color} rounded-full flex items-center justify-center text-[10px] text-white font-black">${s.split(' ')[0]}</div>
                    <div class="font-bold text-sm text-gray-800">${s.split(' ')[1]}</div>
                `;
                container.appendChild(div);
            });
        }

        // 啟動動畫
        window.onload = () => {
            renderStations('red-line-list', RED_STATIONS, 'bg-red-500');
            renderStations('lrt-line-list', LRT_STATIONS, 'bg-green-500');
            setTimeout(() => {
                document.getElementById('line-anim').style.width = '100%';
            }, 500);
        };

        // QR Code 掃描控制
        let html5QrCode;
        function toggleScanner() {
            const ui = document.getElementById('scanner-ui');
            if(ui.classList.contains('hidden')) {
                ui.classList.remove('hidden');
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                    qrCodeMessage => {
                        alert("集章成功！已到達：" + qrCodeMessage);
                        toggleScanner();
                    }
                );
            } else {
                ui.classList.add('hidden');
                if(html5QrCode) html5QrCode.stop();
            }
        }
    </script>
</body>
</html>
